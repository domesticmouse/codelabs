        name: QB
        type: Output
        description: Serial Output B
      - pin: 2
        name: QC
        type: Output
        description: Serial Output C
      - pin: 3
        name: QD
        type: Output
        description: Serial Output D
      - pin: 4
        name: QE
        type: Output
        description: Serial Output E
      - pin: 5
        name: QF
        type: Output
