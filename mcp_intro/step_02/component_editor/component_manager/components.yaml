        name: INPUT
        type: Input
        description: Input voltage
      - pin: 2
        name: GND
        type: Power
        description: Ground
      - pin: 3
        name: OUTPUT
        type: Output
        description: Output voltage (5V)
  - name: LM7905
    type: Regulator
    description: 5V Negative Voltage Regulator
    pins:
      - pin: 1
        name: GND
        type: Power
        description: Ground
      - pin: 2
        name: INPUT
        type: Input
        description: Input voltage (-Vin)
      - pin: 3
        name: OUTPUT
        type: Output
        description: Output voltage (-5V)
  - name: TL072
    type: Op-Amp
    description: Low-Noise JFET-Input Dual Operational Amplifier
    pins:
      - pin: 1
        name: 1OUT
        type: Output
        description: Output, channel 1
      - pin: 2
        name: 1IN-
        type: Input
        description: Inverting input, channel 1
      - pin: 3
        name: 1IN+
        type: Input
        description: Non-inverting input, channel 1
      - pin: 4
        name: VEE
        type: Power
        description: Negative Supply
      - pin: 5
        name: 2IN+
        type: Input
        description: Non-inverting input, channel 2
      - pin: 6
        name: 2IN-
        type: Input
        description: Inverting input, channel 2
      - pin: 7
        name: 2OUT
        type: Output
        description: Output, channel 2
      - pin: 8
        name: VCC
        type: Power
        description: Positive Supply
  - name: LM1117
    type: Regulator
    description: Low Dropout Positive Voltage Regulator
    pins:
      - pin: 1
        name: ADJ/GND
        type: Input
        description: Adjust pin (for adjustable version) or Ground (for fixed version)
      - pin: 2
        name: VOUT
        type: Output
        description: Output voltage
      - pin: 3
        name: VIN
        type: Input
        description: Input voltage
  - name: LM4040
    type: Voltage Reference
    description: Precision Micropower Shunt Voltage Reference
    pins:
      - pin: 1
        name: CATHODE
        type: Power
        description: Cathode
      - pin: 2
        name: ANODE
        type: Power
        description: Anode (Ground)
  - name: LM4041
    type: Voltage Reference
    description: Precision Micropower Shunt Voltage Reference with Adjustable Output
    pins:
      - pin: 1
        name: CATHODE
        type: Power
        description: Cathode
      - pin: 2
        name: ANODE
        type: Power
        description: Anode (Ground)
      - pin: 3
        name: ADJUST
        type: Input
        description: Adjust pin
  - name: TL431
    type: Voltage Reference
    description: Programmable Shunt Regulator
    pins:
      - pin: 1
        name: REFERENCE
        type: Input
        description: Reference voltage input
      - pin: 2
        name: ANODE
        type: Power
        description: Anode (Ground)
      - pin: 3
        name: CATHODE
        type: Power
        description: Cathode
