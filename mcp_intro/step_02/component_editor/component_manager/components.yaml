components:
  - name: LM358
    type: Op-Amp
    description: Low-Power, Dual-Voltage Comparator
    pins:
      - pin: 1
        name: OUTA
        type: Output
        description: Output, channel A
      - pin: 2
        name: -INA
        type: Input
        description: Inverting input, channel A
      - pin: 3
        name: +INA
        type: Input
        description: Non-inverting input, channel A
      - pin: 4
        name: GND
        type: Power
        description: Ground
      - pin: 5
        name: +INB
        type: Input
        description: Non-inverting input, channel B
      - pin: 6
        name: -INB
        type: Input
        description: Inverting input, channel B
      - pin: 7
        name: OUTB
        type: Output
        description: Output, channel B
      - pin: 8
        name: VCC
        type: Power
        description: Positive supply
  - name: LM393
    type: Comparator
    description: Low-Power, Low-Offset Voltage Dual Comparator
    pins:
      - pin: 1
        name: OUTA
        type: Output
        description: Output A
      - pin: 2
        name: -INA
        type: Input
        description: Inverting Input A
      - pin: 3
        name: +INA
        type: Input
        description: Non-Inverting Input A
      - pin: 4
        name: GND
        type: Power
        description: Ground
      - pin: 5
        name: +INB
        type: Input
        description: Non-Inverting Input B
      - pin: 6
        name: -INB
        type: Input
        description: Inverting Input B
      - pin: 7
        name: OUTB
        type: Output
        description: Output B
      - pin: 8
        name: VCC
        type: Power
        description: Positive Supply
  - name: NE555
    type: Timer
    description: Precision Timer
    pins:
      - pin: 1
        name: GND
        type: Power
        description: Ground reference voltage
      - pin: 2
        name: TRIG
        type: Input
        description: Trigger pin; starts the timing interval
      - pin: 3
        name: OUT
        type: Output
        description: Output pin
      - pin: 4
        name: RESET
        type: Input
        description: Reset pin; active low
      - pin: 5
        name: CTRL
        type: Input
        description: Control voltage pin
      - pin: 6
        name: THRES
        type: Input
        description: Threshold pin; ends the timing interval
      - pin: 7
        name: DISCH
        type: Output
        description: Discharge pin
      - pin: 8
        name: VCC
        type: Power
        description: Positive supply voltage
  - name: 74HC00
